<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每週 BOSS 攻略備忘錄</title>
<style>
    /* ==========================================
       1. 主題顏色變數 (Theme Variables)
       ========================================== */
    :root {
      /* 淺色模式 (Light Mode) 預設值 */
      --body-bg: #f8fafc;
      --text-main: #334155;
      --text-muted: #64748b;
      --title-color: #1e293b;
      --char-title-color: #0f172a;

      --card-bg: #ffffff;
      --char-card-bg: #f8fafc;
      --border-color: #e2e8f0;
      --border-darker: #cbd5e1;
      --modal-bg: #ffffff;
      --input-bg: #ffffff;

      /* BOSS 格子狀態 */
      --bg-not-completed: #f1f5f9;
      --text-not-completed: #475569;
      --bg-completed: #dcfce7;
      --text-completed: #15803d;
      --border-completed: #86efac;

      /* 徽章與按鈕 */
      --badge-bg: #e2e8f0;
      --badge-text: #334155;
      --badge-full-bg: #fecaca;
      --badge-full-text: #991b1b;

      /* 主要玩家外框亮色 */
      --primary-card-border: #3b82f6;
      --primary-card-shadow: rgba(59, 130, 246, 0.15);

      --shadow-sm: rgba(0, 0, 0, 0.04);
      --shadow-md: rgba(0, 0, 0, 0.05);
    }

    /* 深色模式 (Dark Mode) 變數覆蓋 */
    .dark-mode {
      --body-bg: #0f172a;
      --text-main: #cbd5e1;
      --text-muted: #94a3b8;
      --title-color: #f1f5f9;
      --char-title-color: #f8fafc;

      --card-bg: #1e293b;
      --char-card-bg: #0f172a;
      --border-color: #334155;
      --border-darker: #475569;
      --modal-bg: #1e293b;
      --input-bg: #0f172a;

      /* BOSS 格子狀態 (深色微調) */
      --bg-not-completed: #334155;
      --text-not-completed: #94a3b8;
      --bg-completed: #064e3b;
      --text-completed: #6ee7b7;
      --border-completed: #059669;

      /* 徽章與按鈕 */
      --badge-bg: #334155;
      --badge-text: #cbd5e1;
      --badge-full-bg: #7f1d1d;
      --badge-full-text: #fca5a5;

      /* 主要玩家外框亮色 (深色版調亮發光) */
      --primary-card-border: #60a5fa;
      --primary-card-shadow: rgba(96, 165, 250, 0.25);

      --shadow-sm: rgba(0, 0, 0, 0.2);
      --shadow-md: rgba(0, 0, 0, 0.3);
    }

    /* ==========================================
       2. 基礎與通用樣式
       ========================================== */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 20px;
      background-color: var(--body-bg);
      color: var(--text-main);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      background: var(--card-bg);
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      box-shadow: 0 1px 3px var(--shadow-md);
      transition: background-color 0.3s, border-color 0.3s;
    }

    .header h2 { 
      margin: 0; 
      font-size: 20px; 
      color: var(--title-color);
    }

    .btn {
      padding: 6px 12px;
      background-color: #0284c7;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: background 0.2s;
    }
    .btn:hover { background-color: #0369a1; }
    .btn-reset { background-color: #ef4444; }
    .btn-reset:hover { background-color: #dc2626; }
    .btn-secondary { background-color: #64748b; }
    .btn-secondary:hover { background-color: #475569; }

    /* 切換主題按鈕樣式 */
    .theme-toggle-btn {
      background: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .theme-toggle-btn:hover {
      background: var(--border-color);
    }

    /* ==========================================
       3. 玩家大區塊 (Player Card)
       ========================================== */
    .player-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 6px var(--shadow-sm);
      transition: background-color 0.3s, border-color 0.3s;
    }

    .player-header {
      font-size: 18px;
      font-weight: bold;
      color: var(--title-color);
      margin-bottom: 0px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s, border-color 0.3s;
    }

    .player-header:hover {
      color: #38bdf8;
    }

    .player-characters {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 14px;
    }

    /* 拖曳排序樣式 */
    .player-card {
      cursor: grab;
      user-select: none;
    }
    .player-card:active {
      cursor: grabbing;
    }
    .player-card.dragging {
      opacity: 0.4;
      border: 2px dashed #0284c7 !important;
    }

    .player-card.is-collapsed .player-characters {
      display: none;
    }

    .player-card.is-collapsed .player-header {
      border-bottom: none;
    }

    .collapse-icon {
      font-size: 14px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    /* 自己角色的專屬亮色外框 */
    .player-card.primary-player {
      border: 2px solid var(--primary-card-border) !important;
      box-shadow: 0 4px 12px var(--primary-card-shadow);
    }

    /* ==========================================
       4. 角色卡片 (Character Card)
       ========================================== */
    .character-card {
      background: var(--char-card-bg);
      border-radius: 8px;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      transition: background-color 0.3s, border-color 0.3s;
      cursor: grab;
      user-select: none;
    }
    .character-card:active {
      cursor: grabbing;
    }
    .character-card.dragging {
      opacity: 0.4;
      border: 2px dashed #0284c7 !important;
    }

    .char-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-darker);
    }

    .char-title {
      font-size: 15px;
      font-weight: bold;
      color: var(--char-title-color);
    }

    .player-tag {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: normal;
    }

    .char-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      background: var(--badge-bg);
      font-weight: bold;
      color: var(--badge-text);
    }
    .char-badge.full {
      background: var(--badge-full-bg);
      color: var(--badge-full-text);
    }

    /* ==========================================
       5. BOSS 網格 (Boss Grid & Cells)
       ========================================== */
    .boss-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }

    .boss-cell {
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease-in-out;
      min-height: 58px;
      box-sizing: border-box;
      text-align: center;
    }

    .boss-name {
      font-size: 12px;
      line-height: 1.2;
    }

    .party-members {
      font-size: 10px;
      margin-top: 3px;
      color: var(--text-muted);
      line-height: 1.2;
      word-break: break-all;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .boss-cell.not-completed {
      background-color: var(--bg-not-completed);
      color: var(--text-not-completed);
    }

    .boss-cell.completed {
      background-color: var(--bg-completed);
      color: var(--text-completed);
      border-color: var(--border-completed);
      font-weight: bold;
    }

    .boss-cell.completed .party-members {
      color: var(--text-completed);
    }

    .party-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.05);
      color: var(--text-muted);
      line-height: 1;
      font-weight: normal;
    }
    .boss-cell.completed .party-badge {
      background: rgba(21, 128, 61, 0.12);
      color: var(--text-completed);
    }

    /* ==========================================
       6. 彈窗 Modal & 表單元素
       ========================================== */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }

    .modal-content {
      background: var(--modal-bg);
      color: var(--text-main);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      width: 340px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .party-select-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 16px 0;
      text-align: left;
    }

    /* Modal 內部的 input / select 在深色模式下的適應 */
    .modal-content input[type="text"],
    .modal-content select {
      background-color: var(--input-bg);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC6_PrlBgVTbmpDCrWP7KMTAq8RHtNsI-M",
      authDomain: "msbossmemo-752e3.firebaseapp.com",
      databaseURL: "https://msbossmemo-752e3-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "msbossmemo-752e3",
      storageBucket: "msbossmemo-752e3.firebasestorage.app",
      messagingSenderId: "747420574318",
      appId: "1:747420574318:web:eff8bdb117a776264cfc7f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.db = db;
    window.dbRef = ref;
    window.dbSet = set;

    window.config = { bosses: [], players: [] };
    window.store = { teams: {}, weeklyRecords: {} };

    const rootRef = ref(db, '/');
    onValue(rootRef, (snapshot) => {
      const data = snapshot.val();
      
      if (data) {
        // 💡 修復：過濾 Firebase 產生的 null 空洞，並防範陣列轉 Object
        let rawBosses = data.bosses || [];
        if (!Array.isArray(rawBosses)) {
          rawBosses = Object.values(rawBosses);
        }
        // 把 null 跟 undefined 濾掉
        window.config.bosses = rawBosses.filter(b => b !== null && b !== undefined);

        // 順便把 players 也加上同樣的安全防護（預防以後你也手動刪除玩家）
        let rawPlayers = data.players || [];
        if (!Array.isArray(rawPlayers)) {
          rawPlayers = Object.values(rawPlayers);
        }
        window.config.players = rawPlayers.filter(p => p !== null && p !== undefined);

        window.store = data.store || { teams: {}, weeklyRecords: {}, guests: [] };
        if (!window.store.guests) window.store.guests = [];
      }

      ensureDefaultSingleTeams();
      renderApp();
    });

    let currentEditingCharId = null;

    window.openEditCharBossesModal = function(charId) {
      currentEditingCharId = charId;
      const modal = document.getElementById("editCharBossesModal");
      const titleEl = document.getElementById("editCharTitle");
      const bossListContainer = document.getElementById("editCharBossList");

      if (!modal || !bossListContainer) return;

      let targetChar = null;
      if (window.config.players) {
        for (const player of window.config.players) {
          if (player.characters) {
            const found = player.characters.find(c => c.id === charId);
            if (found) {
              targetChar = found;
              break;
            }
          }
        }
      }

      if (!targetChar) {
        alert("找不到該角色資料！");
        return;
      }

      titleEl.innerText = `✏️ 編輯 ${targetChar.name} 的 BOSS 清單`;

      bossListContainer.innerHTML = "";
      if (window.config.bosses && Array.isArray(window.config.bosses)) {
        window.config.bosses.forEach(boss => {
          const isChecked = targetChar.bossIds && targetChar.bossIds.includes(boss.id);
          bossListContainer.innerHTML += `
            <label style="font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; color: #334155 !important;">
              <input type="checkbox" class="edit-char-boss-checkbox" value="${boss.id}" ${isChecked ? 'checked' : ''} onchange="handleCharBossCheckboxLimit(this, '.edit-char-boss-checkbox', 'editCharBossCount')" />
              ${boss.name}
            </label>
          `;
        });
      }
      updateCharBossCountDisplay('.edit-char-boss-checkbox', 'editCharBossCount');

      modal.style.display = "flex";
    };

    window.handleCharBossCheckboxLimit = function(checkbox, selector, countSpanId) {
      const checked = document.querySelectorAll(`${selector}:checked`);
      if (checked.length > 12) {
        alert("最多只能選擇 12 隻 BOSS！");
        checkbox.checked = false;
      }
      updateCharBossCountDisplay(selector, countSpanId);
    };

    window.updateCharBossCountDisplay = function(selector, countSpanId) {
      const span = document.getElementById(countSpanId);
      if (!span) return;
      const checkedCount = document.querySelectorAll(`${selector}:checked`).length;
      span.innerText = `(已選 ${checkedCount} / 12)`;
      if (checkedCount >= 12) {
        span.style.color = '#e11d48';
      } else {
        span.style.color = '#64748b';
      }
    };

    window.closeEditCharBossesModal = function() {
      const modal = document.getElementById("editCharBossesModal");
      if (modal) modal.style.display = "none";
      currentEditingCharId = null;
    };

    window.saveEditCharBosses = function() {
      if (!currentEditingCharId) return;

      const selectedBossIds = [];
      const checkboxes = document.querySelectorAll(".edit-char-boss-checkbox:checked");
      checkboxes.forEach(cb => selectedBossIds.push(cb.value));

      if (selectedBossIds.length > 12) {
        alert(`最多只能選擇 12 隻 BOSS！(目前勾選了 ${selectedBossIds.length} 隻)`);
        return;
      }

      let updated = false;
      if (window.config.players) {
        for (const player of window.config.players) {
          if (player.characters) {
            const targetChar = player.characters.find(c => c.id === currentEditingCharId);
            if (targetChar) {
              targetChar.bossIds = selectedBossIds;
              
              if (targetChar.resetBossIds) {
                targetChar.resetBossIds = targetChar.resetBossIds.filter(bId => selectedBossIds.includes(bId));
              }
              
              updated = true;
              break;
            }
          }
        }
      }

      if (!updated) {
        alert("更新失敗，找不到該角色！");
        return;
      }

      if (window.db && window.dbRef && window.dbSet) {
        const playersRef = window.dbRef(window.db, 'players');
        
        window.dbSet(playersRef, window.config.players)
          .then(() => {
            alert("BOSS 清單更新成功！");
            window.closeEditCharBossesModal();
          })
          .catch(err => {
            console.error("Firebase 寫入失敗：", err);
            alert("更新失敗，請檢查權限或網路。");
          });
      }
    };
  </script>

  <script>
  function saveStoreToCloud() {
    if (window.db && window.dbRef && window.dbSet) {
      const storeRef = window.dbRef(window.db, '/store');
      window.dbSet(storeRef, window.store)
        .then(() => console.log("☁️ 雲端同步成功！"))
        .catch((err) => console.error("❌ 雲端同步失敗:", err));
    }
  }

  function getAllCharacters() {
    const chars = [];
    if (!window.config.players) return chars;
    window.config.players.forEach(p => {
      if (p.characters) {
        p.characters.forEach(c => {
          chars.push({ ...c, playerName: p.name });
        });
      }
    });
    return chars;
  }

  function getCharName(charId) {
    const chars = getAllCharacters();
    const c = chars.find(item => item.id === charId);
    if (c) return c.name;
    if (window.store && window.store.guests) {
      const guest = window.store.guests.find(g => g.id === charId);
      if (guest) return `${guest.name} (G)`;
    }
    return charId;
  }

  function ensureDefaultSingleTeams() {
    const allChars = getAllCharacters();
    let updated = false;

    if (!window.config.bosses || window.config.bosses.length === 0) return;

    window.config.bosses.forEach(boss => {
      const maxEntries = boss.allowReset ? 2 : 1;
      for (let entry = 1; entry <= maxEntries; entry++) {
        allChars.forEach(c => {
          if (entry === 2 && (!c.resetBossIds || !c.resetBossIds.includes(boss.id))) {
            return;
          }

          const defaultTeamId = `single_${c.id}_${boss.id}_${entry}`;
          const recordKey = `rec_${c.id}_${boss.id}_${entry}`;

          if (!window.store.weeklyRecords) window.store.weeklyRecords = {};
          if (!window.store.teams) window.store.teams = {};

          if (!window.store.weeklyRecords[recordKey]) {
            window.store.teams[defaultTeamId] = {
              id: defaultTeamId,
              memberTargets: [{ charId: c.id, entryIndex: entry }]
            };
            window.store.weeklyRecords[recordKey] = {
              bossId: boss.id,
              entryIndex: entry,
              teamId: defaultTeamId,
              isCompleted: false
            };
            updated = true;
          }
        });
      }
    });

    if (updated) {
      saveStoreToCloud();
    }
  }

  function getCharacterCompletedCount(charId) {
    let count = 0;
    if (!window.store.weeklyRecords) return 0;
    
    Object.keys(window.store.weeklyRecords).forEach(recordKey => {
      if (recordKey.startsWith(`rec_${charId}_`)) {
        const record = window.store.weeklyRecords[recordKey];
        if (record && record.isCompleted) {
          count++;
        }
      }
    });
    return count;
  }

  function renderApp() {
    updateUserSelectOptions();

    const container = document.getElementById("characterList");
    if (!container) return;
    
    container.innerHTML = "";

    if (!window.config.players || !Array.isArray(window.config.players) || window.config.players.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding: 40px; color: #64748b;">⚠️ 未讀取到玩家設定檔</div>`;
      return;
    }

    const primaryUser = getPrimaryUser();
    const savedOrder = getPlayerOrder();

    // 排序邏輯：指定主要玩家置頂，其餘依照 localStorage 拖曳順序排列
    const sortedPlayers = [...window.config.players].sort((a, b) => {
      if (a.name === primaryUser) return -1;
      if (b.name === primaryUser) return 1;

      const indexA = savedOrder.indexOf(a.name);
      const indexB = savedOrder.indexOf(b.name);

      if (indexA !== -1 && indexB !== -1) return indexA - indexB;
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return 0;
    });

    sortedPlayers.forEach((p, pIdx) => {
      const playerId = `p_${pIdx}`;
      const isPrimary = p.name === primaryUser;

      let playerHTML = `
        <div class="player-card ${isPrimary ? 'primary-player' : ''}" 
            id="player-card-${playerId}" 
            draggable="true" 
            data-player-name="${p.name}">
          <div class="player-header" onclick="togglePlayerCollapse('${playerId}')">
            <span>👤 玩家：${p.name} ${isPrimary ? ' ⭐ (自己)' : ''}</span>
            <span class="collapse-icon" id="collapse-icon-${playerId}">▼ 收合</span>
          </div>
          <div class="player-characters">
      `;

      // 💡 關鍵修復：Firebase 取回的空陣列會變成 undefined，在此加上空值保護
      const rawCharacters = p.characters || [];

      // 依照該玩家儲存的自訂拖曳順序排序角色，未儲存過順序的角色維持原本順序
      const savedCharOrder = getCharacterOrder(p.name);
      const characters = [...rawCharacters].sort((a, b) => {
        const idxA = savedCharOrder.indexOf(a.id);
        const idxB = savedCharOrder.indexOf(b.id);
        if (idxA !== -1 && idxB !== -1) return idxA - idxB;
        if (idxA !== -1) return -1;
        if (idxB !== -1) return 1;
        return 0;
      });

      if (characters.length === 0) {
        playerHTML += `
          <div style="padding: 10px 20px; color: #94a3b8; font-size: 13px; font-style: italic;">
            尚無角色，請點擊上方「➕ 新增角色」來為 ${p.name} 建立角色。
          </div>
        `;
      } else {
        characters.forEach(c => {
          const count = getCharacterCompletedCount(c.id);
          const isFull = count >= 12;

          playerHTML += `
            <div class="character-card" draggable="true" data-char-id="${c.id}" data-player-name="${p.name}">
              <div class="char-header">
                <div class="char-title" style="display: flex; align-items: center; gap: 6px;">
                  ⚔️ ${c.name}
                  <button class="btn-icon" 
                          onclick="event.stopPropagation(); openEditCharBossesModal('${c.id}')" 
                          title="編輯角色的 BOSS 清單"
                          style="background: transparent; border: none; cursor: pointer; padding: 2px 4px; font-size: 12px; color: #64748b; border-radius: 4px; line-height: 1;"
                          onmouseover="this.style.background='#e2e8f0'" 
                          onmouseout="this.style.background='transparent'">
                    ✏️
                  </button>
                  <button class="btn-icon"
                          onclick="event.stopPropagation(); openRenameCharModal('${c.id}', '${c.name.replace(/'/g, "\\'")}')"
                          title="修改角色名稱"
                          style="background: transparent; border: none; cursor: pointer; padding: 2px 4px; font-size: 12px; color: #64748b; border-radius: 4px; line-height: 1;"
                          onmouseover="this.style.background='#e2e8f0'"
                          onmouseout="this.style.background='transparent'">
                    🖊️
                  </button>
                </div>
                <span class="char-badge ${isFull ? 'full' : ''}">已完成 ${count} / 12</span>
              </div>
              <div class="boss-grid">
          `;

          window.config.bosses.forEach(boss => {
            if (c.bossIds && Array.isArray(c.bossIds) && c.bossIds.length > 0 && !c.bossIds.includes(boss.id)) {
              return;
            }

            const maxEntries = boss.allowReset ? 2 : 1;

            for (let entry = 1; entry <= maxEntries; entry++) {
              if (entry === 2 && (!c.resetBossIds || !c.resetBossIds.includes(boss.id))) {
                continue;
              }

              const recordKey = `rec_${c.id}_${boss.id}_${entry}`;
              const record = window.store.weeklyRecords ? window.store.weeklyRecords[recordKey] : null;
              const team = record && window.store.teams ? window.store.teams[record.teamId] : null;

              if (record && team) {
                const isCompleted = record.isCompleted;
                
                let rawMembers = team.memberTargets || (team.memberCharIds || []).map(id => ({ charId: id, entryIndex: entry }));
                
                const validMembers = rawMembers.filter(m => {
                  if (!m.charId.startsWith("guest_")) return true;
                  return window.store.guests && window.store.guests.some(g => g.id === m.charId);
                });

                const partyMembers = validMembers.filter(m => !(m.charId === c.id && m.entryIndex === entry));

                const allMemberNames = validMembers.map(m => {
                  const name = getCharName(m.charId);
                  return m.entryIndex === 2 ? `${name}(重置)` : name;
                }).join(", ");

                const displayTeamText = partyMembers.length > 0
                  ? partyMembers.map(m => {
                      const name = getCharName(m.charId);
                      return m.entryIndex === 2 ? `${name}(重置)` : name;
                    }).join(", ")
                  : '單人';

                const bossDisplayName = entry === 2 ? `${boss.name}(重置)` : boss.name;

                playerHTML += `
                  <div class="boss-cell ${isCompleted ? 'completed' : 'not-completed'}"
                      onclick="toggleBossStatus('${recordKey}')"
                      oncontextmenu="openPartyModal(event, '${c.id}', '${boss.id}', ${entry})"
                      title="隊伍成員: ${allMemberNames} (右鍵可編輯隊伍)">
                    <div class="boss-name">${bossDisplayName}</div>
                    <div class="party-members">${displayTeamText}</div>
                  </div>
                `;
              }
            }
          });

          playerHTML += `
              </div>
            </div>
          `;
        });
      }

      playerHTML += `
          </div>
        </div>
      `;

      container.innerHTML += playerHTML;
    });

    renderGuestSection();
    initDragAndDrop();

  function toggleBossStatus(recordKey) {
    const record = window.store.weeklyRecords[recordKey];
    if (!record || !record.teamId) return;

    const team = window.store.teams[record.teamId];
    const members = team.memberTargets || (team.memberCharIds || []).map(id => ({ charId: id, entryIndex: record.entryIndex }));

    if (!record.isCompleted && team) {
      for (const m of members) {
        if (m.charId.startsWith("guest_")) continue;
        if (getCharacterCompletedCount(m.charId) >= 12) {
          alert(`角色 [${getCharName(m.charId)}] 本週攻略數量已達 12 隻上限！`);
          return;
        }
      }
    }

    const nextStatus = !record.isCompleted;
    Object.values(window.store.weeklyRecords).forEach(r => {
      if (r.teamId === record.teamId) {
        r.isCompleted = nextStatus;
      }
    });

    saveStoreToCloud();
  }

  function resetWeeklyStatus() {
      const primaryUser = getPrimaryUser();

      if (!primaryUser) {
        alert("請先在上方選單選擇「排在最上方」的主要玩家！");

      }

      const primaryPlayerObj = window.config.players.find(p => p.name === primaryUser);
      if (!primaryPlayerObj || !primaryPlayerObj.characters || primaryPlayerObj.characters.length === 0) {
        alert(`主要玩家 [${primaryUser}] 之下沒有任何角色！`);
        return;
      }

      const primaryCharIds = new Set(primaryPlayerObj.characters.map(c => c.id));

      if (confirm(`確定要重置主要玩家 [${primaryUser}] 本週所有角色的 BOSS 攻略狀態嗎？\n(其他玩家進度與組隊資訊將完整保留)`)) {
        if (window.store && window.store.weeklyRecords) {
          Object.keys(window.store.weeklyRecords).forEach(key => {
            primaryCharIds.forEach(charId => {
              if (key.startsWith(`rec_${charId}_`)) {
                window.store.weeklyRecords[key].isCompleted = false;
              }
            });
          });
        }
        saveStoreToCloud();
      }
    }

  // ==================== Modal 與操控邏輯 (重點重構區) ====================
  let editingCharId = null;
  let editingBossId = null;
  let editingEntry = 1;

  function renderPartySelectList(initialMemberTargets = [], autoCheckGuestId = null, isFreshOpen = false) {
      const listContainer = document.getElementById("partySelectList");
      if (!listContainer) return;

      const boss = window.config.bosses.find(b => b.id === editingBossId);
      const maxPartySize = boss ? boss.maxPartySize : 1;

      let checkedKeys = [];
      if (isFreshOpen) {
        checkedKeys = initialMemberTargets.map(m => `${m.charId}_${m.entryIndex}`);
      } else {
        const existingCheckboxes = document.querySelectorAll('input[name="partyChar"]:checked');
        if (existingCheckboxes.length > 0) {
          checkedKeys = Array.from(existingCheckboxes).map(cb => cb.value);
        } else {
          checkedKeys = initialMemberTargets.map(m => `${m.charId}_${m.entryIndex}`);
        }
      }

      if (autoCheckGuestId && !checkedKeys.includes(`${autoCheckGuestId}_1`)) {
        checkedKeys.push(`${autoCheckGuestId}_1`);
      }

      // 💡 在標題區塊新增紅字警告提示 (預設 display: none)
      let html = `
        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
          該 BOSS 人數上限為 <b style="color: var(--title-color);">${maxPartySize}</b> 人
          <span id="partyLimitWarning" style="display: none; color: #ef4444; font-weight: bold; margin-left: 6px; background: rgba(239, 68, 68, 0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(239, 68, 68, 0.2);">
            ⚠️ 已達隊伍人數上限
          </span>
        </div>
        <div style="font-weight: bold; font-size: 13px; margin-bottom: 6px; color: var(--title-color);">⚔️ 正式角色與攻略輪次：</div>
      `;

      const allChars = getAllCharacters();
      
      allChars.forEach(c => {
        const hasBoss = c.bossIds && c.bossIds.includes(editingBossId);
        if (!hasBoss) return;

        const hasReset = c.resetBossIds && c.resetBossIds.includes(editingBossId);
        const availableEntries = hasReset ? [1, 2] : [1];

        availableEntries.forEach(entryIdx => {
          const targetKey = `${c.id}_${entryIdx}`;
          const isSelf = (c.id === editingCharId && entryIdx === editingEntry);

          // 檢查該角色此卡片是否已屬於「其他已滿員的隊伍」
          if (!isSelf) {
            const targetRecKey = `rec_${c.id}_${editingBossId}_${entryIdx}`;
            const targetRec = window.store.weeklyRecords ? window.store.weeklyRecords[targetRecKey] : null;
            
            if (targetRec && targetRec.teamId) {
              const targetTeam = window.store.teams ? window.store.teams[targetRec.teamId] : null;
              if (targetTeam) {
                const members = targetTeam.memberTargets || (targetTeam.memberCharIds || []).map(id => ({ charId: id, entryIndex: entryIdx }));
                const isSelfInTargetTeam = members.some(m => m.charId === editingCharId && m.entryIndex === editingEntry);

                if (!isSelfInTargetTeam && members.length >= maxPartySize) {
                  return; // 跳過不渲染此選項
                }
              }
            }
          }

          const isChecked = isSelf || checkedKeys.includes(targetKey);
          const labelStyle = isSelf 
            ? 'cursor: not-allowed; font-size: 13px; display: flex; align-items: center; gap: 6px; opacity: 0.6; font-weight: bold;' 
            : 'cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px;';

          const entryTag = entryIdx === 2 ? ' (重置刷)' : ' (首次刷)';

          html += `
            <label style="${labelStyle}">
              <input type="checkbox" name="partyChar" value="${targetKey}" 
                    data-is-self="${isSelf}"
                    ${isChecked ? 'checked' : ''} 
                    ${isSelf ? 'disabled' : ''} 
                    onchange="updatePartyCheckboxStates()">
              ${c.name} (${c.playerName})${entryTag} ${isSelf ? '✨(隊長)' : ''}
            </label>`;
        });
      });

      html += `<hr style="border:0; border-top:1px var(--border-color) solid; margin: 12px 0 10px 0;">`;
      html += `
        <div style="font-weight: bold; font-size: 13px; margin-bottom: 6px; color: var(--title-color);">👤 Guest 臨時隊友：</div>
        <div style="display: flex; gap: 6px; margin-bottom: 8px;">
          <input type="text" id="newGuestNameInput" placeholder="輸入 Guest 名字" style="flex: 1; padding: 5px 8px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main);" onkeypress="if(event.key==='Enter'){ event.preventDefault(); addGuestMember(); }" />
          <button class="btn" style="padding: 4px 10px; font-size: 12px; white-space: nowrap;" onclick="addGuestMember()">➕ 新增</button>
        </div>
        <div style="max-height: 130px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;">
      `;

      if (window.store && window.store.guests && window.store.guests.length > 0) {
        window.store.guests.forEach(g => {
          const targetKey = `${g.id}_1`;
          const isChecked = checkedKeys.includes(targetKey);
          html += `
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label style="cursor:pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; color: #0284c7;">
                <input type="checkbox" name="partyChar" value="${targetKey}" 
                      data-is-self="false"
                      ${isChecked ? 'checked' : ''} 
                      onchange="updatePartyCheckboxStates()">
                ${g.name} <span style="font-size:11px; color:var(--text-muted);">(Guest)</span>
              </label>
              <button onclick="deleteGuestMember('${g.id}')" style="background: transparent; border: none; cursor: pointer; font-size: 12px; color: #ef4444;" title="刪除 Guest 隊友">🗑️</button>
            </div>`;
        });
      } else {
        html += `<div style="font-size: 12px; color: var(--text-muted); font-style: italic;">目前尚無 Guest 隊友，可在上方輸入新增。</div>`;
      }
      html += `</div>`;

      listContainer.innerHTML = html;

      // 渲染完成後立刻刷新一次狀態
      updatePartyCheckboxStates();
    }

  window.addGuestMember = function() {
    const input = document.getElementById("newGuestNameInput");
    if (!input) return;
    const guestName = input.value.trim();
    if (!guestName) {
      alert("請輸入 Guest 名字！");
      return;
    }
    if (!window.store.guests) window.store.guests = [];
    
    let guestObj = window.store.guests.find(g => g.name === guestName);
    if (!guestObj) {
      guestObj = { id: `guest_${Date.now()}`, name: guestName };
      window.store.guests.push(guestObj);
      saveStoreToCloud();
    }
    input.value = "";
    renderPartySelectList([], guestObj.id);
  };

  window.deleteGuestMember = function(guestId) {
    if (!confirm("確定要刪除此 Guest 隊友嗎？(已存在該 Guest 的隊伍將會自動移除此隊友)")) return;
    if (window.store) {
      if (window.store.guests) {
        window.store.guests = window.store.guests.filter(g => g.id !== guestId);
      }
      if (window.store.teams) {
        Object.values(window.store.teams).forEach(team => {
          if (team) {
            if (team.memberTargets) {
              team.memberTargets = team.memberTargets.filter(m => m.charId !== guestId);
            }
            if (team.memberCharIds) {
              team.memberCharIds = team.memberCharIds.filter(id => id !== guestId);
            }
          }
        });
      }
      saveStoreToCloud();
      renderPartySelectList();
      renderApp();
    }
  };

  function openPartyModal(event, charId, bossId, entryIndex) {
    event.preventDefault();
    editingCharId = charId;
    editingBossId = bossId;
    editingEntry = entryIndex;

    const boss = window.config.bosses.find(b => b.id === bossId);
    document.getElementById("partyModalTitle").innerText = `組隊設定：${getCharName(charId)} - ${boss.name}`;
    document.getElementById("partyModalSubtitle").innerText = `該 BOSS 人數上限為 ${boss.maxPartySize} 人 (預設為單人)`;

    const recordKey = `rec_${charId}_${bossId}_${entryIndex}`;
    const record = window.store.weeklyRecords[recordKey];
    let currentTargets = [{ charId: charId, entryIndex: entryIndex }];

    if (record && record.teamId && window.store.teams[record.teamId]) {
      const team = window.store.teams[record.teamId];
      if (team.memberTargets) {
        currentTargets = team.memberTargets;
      } else if (team.memberCharIds) {
        currentTargets = team.memberCharIds.map(id => ({ charId: id, entryIndex: entryIndex }));
      }
    }

  function savePartyTeam() {
    const boss = window.config.bosses.find(b => b.id === editingBossId);
    const checkboxes = document.querySelectorAll('input[name="partyChar"]:checked');
    
    // 解析勾選的 "charId_entryIndex"
    let selectedTargets = Array.from(checkboxes).map(cb => {
      const parts = cb.value.split("_");
      const entryIdx = parseInt(parts.pop(), 10);
      const cId = parts.join("_");
      return { charId: cId, entryIndex: entryIdx };
    });

    if (selectedTargets.length === 0) {
      selectedTargets = [{ charId: editingCharId, entryIndex: editingEntry }];
    }

    if (selectedTargets.length > boss.maxPartySize) {
      alert(`該 BOSS 人數上限為 ${boss.maxPartySize} 人，你選擇了 ${selectedTargets.length} 人！`);
      return;
    }

    // 1. 找出變更前的舊隊伍成員標的
    const currentRecordKey = `rec_${editingCharId}_${editingBossId}_${editingEntry}`;
    const currentRecord = window.store.weeklyRecords[currentRecordKey];
    let oldTargets = [];
    if (currentRecord && currentRecord.teamId && window.store.teams[currentRecord.teamId]) {
      const oldTeam = window.store.teams[currentRecord.teamId];
      oldTargets = oldTeam.memberTargets || (oldTeam.memberCharIds || []).map(id => ({ charId: id, entryIndex: editingEntry }));
    }

    // 2. 建立新隊伍
    const sortedKey = selectedTargets.map(t => `${t.charId}:${t.entryIndex}`).sort().join("_");
    const sharedTeamId = `team_${editingBossId}_${Date.now()}_${sortedKey}`;

    if (!window.store.teams) window.store.teams = {};
    window.store.teams[sharedTeamId] = { 
      id: sharedTeamId, 
      memberTargets: selectedTargets,
      memberCharIds: selectedTargets.map(t => t.charId) // 相容保留
    };

    // 3. 更新被勾選成員各自輪次的記錄
    selectedTargets.forEach(target => {
      if (target.charId.startsWith("guest_")) return;
      const recKey = `rec_${target.charId}_${editingBossId}_${target.entryIndex}`;
      const oldRecord = window.store.weeklyRecords[recKey];
      window.store.weeklyRecords[recKey] = {
        bossId: editingBossId,
        entryIndex: target.entryIndex,
        teamId: sharedTeamId,
        isCompleted: oldRecord ? oldRecord.isCompleted : false
      };
    });

    // 4. 被踢出或取消勾選的舊成員，恢復成他們的單人預設隊伍
    const removedTargets = oldTargets.filter(oldT => 
      !selectedTargets.some(newT => newT.charId === oldT.charId && newT.entryIndex === oldT.entryIndex)
    );

    removedTargets.forEach(target => {
      if (target.charId.startsWith("guest_")) return;
      const defaultTeamId = `single_${target.charId}_${editingBossId}_${target.entryIndex}`;
      const recKey = `rec_${target.charId}_${editingBossId}_${target.entryIndex}`;
      const oldRecord = window.store.weeklyRecords[recKey];

      window.store.teams[defaultTeamId] = {
        id: defaultTeamId,
        memberTargets: [{ charId: target.charId, entryIndex: target.entryIndex }],
        memberCharIds: [target.charId]
      };

      window.store.weeklyRecords[recKey] = {
        bossId: editingBossId,
        entryIndex: target.entryIndex,
        teamId: defaultTeamId,
        isCompleted: oldRecord ? oldRecord.isCompleted : false
      };
    });

    saveStoreToCloud();
    renderApp();
    closePartyModal();
  }

    const listContainer = document.getElementById("partySelectList");

  window.openResetConfigModal = function() {

        : `目前顯示的是主要玩家「${displayedPlayerName}」的角色`;
      const hintColor = isFallback ? "#b45309" : "#64748b";
      modalBody.innerHTML += `<div style="font-size:12px; color:${hintColor}; margin-bottom:8px;">${hintText}</div>`;

      targetChars.forEach(c => {
        const availableResetBosses = resetableBosses.filter(b => c.bossIds && c.bossIds.includes(b.id));

        let charSection = `<div><strong>${c.name} (${c.playerName})</strong><br>`;
        
        if (availableResetBosses.length === 0) {
          charSection += `<span style="font-size:12px; color:#94a3b8;">（該角色的 BOSS 清單中沒有支援重置券的項目）</span>`;
        } else {
          availableResetBosses.forEach(b => {
            const isChecked = c.resetBossIds && c.resetBossIds.includes(b.id);
            charSection += `
              <label style="font-size:13px; margin-right:10px; cursor:pointer;">
                <input type="checkbox" onchange="toggleResetConfig('${c.id}', '${b.id}')" ${isChecked ? 'checked' : ''}>
                ${b.name}
              </label>`;
          });
        }

        charSection += `</div><hr style="border:0; border-top:1px #eee solid; margin:6px 0;">`;
        modalBody.innerHTML += charSection;
      });
    }

    document.getElementById("resetModal").style.display = "flex";
  };

  function toggleResetConfig(charId, bossId) {
    window.config.players.forEach(p => {
      (p.characters || []).forEach(c => {
        if (c.id === charId) {
          if (!c.resetBossIds) c.resetBossIds = [];
          const index = c.resetBossIds.indexOf(bossId);
          if (index > -1) {
            c.resetBossIds.splice(index, 1);
          } else {
            const normalCount = c.bossIds ? c.bossIds.length : 0;
            const resetCount = c.resetBossIds.length;
            const totalAfterAdd = normalCount + resetCount + 1;

            if (totalAfterAdd > 12) {
              alert(`角色 [${c.name}] 的 BOSS 攻略數量已達 12 隻上限（一般 ${normalCount} 隻 + 重置 ${resetCount} 隻），無法再新增重置券！`);
              const checkboxes = document.querySelectorAll(`input[onchange*="${charId}"][onchange*="${bossId}"]`);
              checkboxes.forEach(cb => { cb.checked = false; });
              return;
            }
            c.resetBossIds.push(bossId);
          }
        }
      });
    });

    if (window.db && window.dbRef && window.dbSet) {
      const playersRef = window.dbRef(window.db, '/players');
      window.dbSet(playersRef, window.config.players);
    }
    renderApp();
  }

  function closeResetConfigModal() {
    document.getElementById("resetModal").style.display = "none";
  }

  function togglePlayerCollapse(playerId) {
    const card = document.getElementById(`player-card-${playerId}`);
    const icon = document.getElementById(`collapse-icon-${playerId}`);

    if (!card) return;
    const isCollapsed = card.classList.toggle("is-collapsed");
    if (icon) {
      icon.innerText = isCollapsed ? "▲ 展開" : "▼ 收合";
    }
  }

  function toggleAllPlayers(shouldCollapse) {
    const cards = document.querySelectorAll('.player-card');
    cards.forEach(card => {
      if (shouldCollapse) {
        card.classList.add('is-collapsed');
      } else {
        card.classList.remove('is-collapsed');
      }
      
      const icon = card.querySelector('.collapse-icon');
      if (icon) {
        icon.innerText = shouldCollapse ? "▲ 展開" : "▼ 收合";
      }
    });
  }

  function getPrimaryUser() {
    return localStorage.getItem("preferred_primary_user") || "";
  }

  function changePrimaryUser(userName) {
    localStorage.setItem("preferred_primary_user", userName);
    renderApp();
  }

  function updateUserSelectOptions() {
    const select = document.getElementById("userSelect");
    if (!select) return;

    const currentPrimary = getPrimaryUser();
    select.innerHTML = `<option value="">-- 不排序 (預設) --</option>`;

    if (window.config.players && Array.isArray(window.config.players)) {
      window.config.players.forEach(p => {
        if (p && p.name) {
          const isSelected = p.name === currentPrimary ? 'selected' : '';
          select.innerHTML += `<option value="${p.name}" ${isSelected}>👤 ${p.name}</option>`;
        }
      });
    }
  }

  function handleOverlayClick(event, closeFunction) {
    if (event.target === event.currentTarget) {
      if (typeof closeFunction === 'function') {
        closeFunction();
      }
    }
  }

  window.openAddCharacterModal = function() {
    const modal = document.getElementById("addCharacterModal");
    const playerSelect = document.getElementById("newCharPlayerSelect");
    const bossListContainer = document.getElementById("newCharBossList");
    const nameInput = document.getElementById("newCharNameInput");

    if (!modal || !playerSelect || !bossListContainer) return;

    nameInput.value = "";

    playerSelect.innerHTML = "";
    const primaryUser = getPrimaryUser();
    if (window.config.players && Array.isArray(window.config.players)) {
      window.config.players.forEach(p => {
        const isSelected = p.name === primaryUser ? "selected" : "";
        playerSelect.innerHTML += `<option value="${p.name}" ${isSelected}>👤 ${p.name}</option>`;
      });
    }

    bossListContainer.innerHTML = "";
    if (window.config.bosses && Array.isArray(window.config.bosses)) {
      const reversedBosses = window.config.bosses.slice().reverse();
      
      reversedBosses.forEach(boss => {
        bossListContainer.innerHTML += `
          <label style="font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; color: #334155 !important;">
            <input type="checkbox" class="new-char-boss-checkbox" value="${boss.id}" onchange="handleCharBossCheckboxLimit(this, '.new-char-boss-checkbox', 'newCharBossCount')" />
            ${boss.name}
          </label>
        `;
      });
    }
    updateCharBossCountDisplay('.new-char-boss-checkbox', 'newCharBossCount');

    modal.style.display = "flex";
  };

  window.closeAddCharacterModal = function() {
    const modal = document.getElementById("addCharacterModal");
    if (modal) modal.style.display = "none";
  };

  window.submitNewCharacter = function() {
    const playerName = document.getElementById("newCharPlayerSelect").value;
    const charName = document.getElementById("newCharNameInput").value.trim();

    if (!charName) {
      alert("請輸入角色名稱！");
      return;
    }

    const selectedBossIds = [];
    const checkboxes = document.querySelectorAll(".new-char-boss-checkbox:checked");
    checkboxes.forEach(cb => selectedBossIds.push(cb.value));

    if (selectedBossIds.length > 12) {
      alert(`最多只能選擇 12 隻 BOSS！(目前勾選了 ${selectedBossIds.length} 隻)`);
      return;
    }

    const playerIndex = window.config.players.findIndex(p => p.name === playerName);
    if (playerIndex === -1) {
      alert("找不到對應的玩家！");
      return;
    }

    const newCharId = `char_p${playerIndex + 1}_${Date.now()}`;

    const newCharacter = {
      id: newCharId,
      name: charName,
      bossIds: selectedBossIds,
      resetBossIds: []
    };

    if (!window.config.players[playerIndex].characters) {
      window.config.players[playerIndex].characters = [];
    }
    window.config.players[playerIndex].characters.push(newCharacter);

    if (window.db && window.dbRef && window.dbSet) {
      const playersRef = window.dbRef(window.db, 'players');
      
      window.dbSet(playersRef, window.config.players)
        .then(() => {
          alert(`成功為 ${playerName} 新增角色：${charName}！`);
          window.closeAddCharacterModal();
        })
        .catch(err => {
          console.error("Firebase 寫入失敗：", err);
          alert("新增失敗，請檢查權限或網路連線。");
        });
    } else {
      console.error("Firebase 實例未成功初始化 (window.db/dbSet 未載入)");
      alert("資料庫連線失敗，請重新整理頁面。");
    }
  };

  let renamingCharId = null;

  window.openRenameCharModal = function(charId, currentName) {
    renamingCharId = charId;
    const input = document.getElementById("renameCharInput");
    if (input) {
      input.value = currentName;
      input.select();
    }
    document.getElementById("renameCharModal").style.display = "flex";
    setTimeout(() => { if (input) input.focus(); }, 50);
  };

  window.closeRenameCharModal = function() {
    document.getElementById("renameCharModal").style.display = "none";
    renamingCharId = null;
  };

  window.submitRenameChar = function() {
    const newName = document.getElementById("renameCharInput").value.trim();
    if (!newName) {
      alert("請輸入新的角色名稱！");
      return;
    }
    if (!renamingCharId) return;

    let updated = false;
    window.config.players.forEach(p => {
      p.characters.forEach(c => {
        if (c.id === renamingCharId) {
          c.name = newName;
          updated = true;
        }
      });
    });

    if (!updated) {
      alert("找不到該角色，更新失敗！");
      return;
    }

    if (window.db && window.dbRef && window.dbSet) {
      const playersRef = window.dbRef(window.db, 'players');
      window.dbSet(playersRef, window.config.players)
        .then(() => {
          window.closeRenameCharModal();
        })
        .catch(err => {
          console.error("Firebase 寫入失敗：", err);
          alert("更新失敗，請檢查權限或網路連線。");
        });
    }
  };

  (function applyThemeImmediately() {
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

    if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
      document.documentElement.classList.add("dark-mode");
    } else {
      document.documentElement.classList.remove("dark-mode");
    }
  })();

  window.toggleTheme = function() {
    const isDark = document.documentElement.classList.toggle("dark-mode");
    localStorage.setItem("theme", isDark ? "dark" : "light");
    updateThemeButton(isDark);
  };

  function updateThemeButton(isDark) {
    const iconEl = document.getElementById("themeIcon");
    const textEl = document.getElementById("themeText");
    
    if (iconEl && textEl) {
      iconEl.innerText = isDark ? "☀️" : "🌙";
      textEl.innerText = isDark ? "淺色模式" : "深色模式";
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    const isDark = document.documentElement.classList.contains("dark-mode");
    updateThemeButton(isDark);
  });

  function openAddPlayerModal() {
    document.getElementById("newPlayerName").value = "";
    document.getElementById("addPlayerModal").style.display = "flex";
  }

  function closeAddPlayerModal() {
    document.getElementById("addPlayerModal").style.display = "none";
  }

  async function submitAddPlayer() {
    const playerName = document.getElementById("newPlayerName").value.trim();

    if (!playerName) {
      alert("請輸入玩家名稱！");
      return;
    }

    const currentPlayers = window.config.players || [];

    const isExist = currentPlayers.some(p => p.name === playerName);
    if (isExist) {
      alert("該玩家名稱已存在！");
      return;
    }

    const newPlayer = {
      name: playerName,
      characters: []
    };

    const updatedPlayers = [...currentPlayers, newPlayer];

    try {
      const playersRef = window.dbRef(window.db, '/players');
      await window.dbSet(playersRef, updatedPlayers);
      closeAddPlayerModal();
    } catch (error) {
      console.error("寫入 Firebase 失敗：", error);
      alert("新增玩家失敗，請稍後再試！");
    }
  }

  function updatePartyCheckboxStates() {
      const boss = window.config.bosses.find(b => b.id === editingBossId);
      const maxPartySize = boss ? boss.maxPartySize : 1;

      // 取得所有 partyChar 的選取框
      const checkboxes = Array.from(document.querySelectorAll('input[name="partyChar"]'));
      // 計算目前已被勾選的數量
      const checkedCount = checkboxes.filter(cb => cb.checked).length;

      // 🔥 控制上限警告標語的顯示/隱藏
      const warningEl = document.getElementById("partyLimitWarning");
      if (warningEl) {
        if (checkedCount >= maxPartySize) {
          warningEl.style.display = "inline-block"; // 顯示紅字提示
        } else {
          warningEl.style.display = "none"; // 未達上限則隱藏
        }
      }

      checkboxes.forEach(cb => {
        const isSelf = cb.getAttribute('data-is-self') === 'true';

        // 自己始終保持勾選且不可切換
        if (isSelf) {
          cb.disabled = true;
          return;
        }

        const label = cb.closest('label');

        if (checkedCount >= maxPartySize) {
          // 達到上限：未勾選的項目設為 disabled
          if (!cb.checked) {
            cb.disabled = true;
            if (label) {
              label.style.opacity = '0.4';
              label.style.cursor = 'not-allowed';
            }
          } else {
            // 已勾選的非隊長項目，依然可以取消勾選
            cb.disabled = false;
            if (label) {
              label.style.opacity = '1';
              label.style.cursor = 'pointer';
            }
          }
        } else {
          // 未達上限：所有非隊長的項目皆可自由勾選
          cb.disabled = false;
          if (label) {
            label.style.opacity = '1';
            label.style.cursor = 'pointer';
          }
        }
      });
    }

    // 取得儲存的玩家排序
    function getPlayerOrder() {
      const saved = localStorage.getItem("player_custom_order");
      return saved ? JSON.parse(saved) : [];
    }

    // 儲存玩家排序至 LocalStorage
    function savePlayerOrder(orderArray) {
      localStorage.setItem("player_custom_order", JSON.stringify(orderArray));
    }

    // 取得指定玩家底下的角色自訂排序
    function getCharacterOrder(playerName) {
      const saved = localStorage.getItem(`character_custom_order_${playerName}`);
      return saved ? JSON.parse(saved) : [];
    }

    // 儲存指定玩家底下的角色排序至 LocalStorage
    function saveCharacterOrder(playerName, orderArray) {
      localStorage.setItem(`character_custom_order_${playerName}`, JSON.stringify(orderArray));
    }

    // 初始化拖曳事件 (使用 Event Delegation，同時支援玩家排序與角色排序)
    function initDragAndDrop() {
      const container = document.getElementById("characterList");
      if (!container || container.dataset.dragInited) return;

      let draggedCard = null;
      let draggedType = null; // "player" | "character"

      container.addEventListener("dragstart", (e) => {
        // 避免點擊按鈕或輸入框時觸發拖曳
        if (['BUTTON', 'INPUT', 'SELECT', 'OPTION'].includes(e.target.tagName)) {
          e.preventDefault();
          return;
        }

        // 優先判斷是否拖的是角色卡（角色卡巢狀在玩家卡裡面，需先比對較內層的元素）
        const charCard = e.target.closest(".character-card");
        if (charCard) {
          draggedCard = charCard;
          draggedType = "character";
          charCard.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
          return;
        }

        const playerCard = e.target.closest(".player-card");
        if (!playerCard) return;

        draggedCard = playerCard;
        draggedType = "player";
        playerCard.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
      });

      container.addEventListener("dragend", () => {
        if (draggedCard) draggedCard.classList.remove("dragging");
        draggedCard = null;
        draggedType = null;
      });

      container.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";

        if (draggedType === "character") {
          const targetCard = e.target.closest(".character-card");
          if (!targetCard || targetCard === draggedCard) return;
          // 限制只能在同一位玩家的角色清單內排序，避免拖曳到其他玩家底下
          if (targetCard.parentElement !== draggedCard.parentElement) return;

          const rect = targetCard.getBoundingClientRect();
          const next = (e.clientY - rect.top) / (rect.bottom - rect.top) > 0.5;
          targetCard.parentElement.insertBefore(draggedCard, next ? targetCard.nextSibling : targetCard);
          return;
        }

        if (draggedType === "player") {
          const targetCard = e.target.closest(".player-card");
          if (!targetCard || targetCard === draggedCard) return;

          const rect = targetCard.getBoundingClientRect();
          const next = (e.clientY - rect.top) / (rect.bottom - rect.top) > 0.5;
          container.insertBefore(draggedCard, next ? targetCard.nextSibling : targetCard);
        }
      });

      container.addEventListener("drop", (e) => {
        e.preventDefault();

        if (draggedType === "character" && draggedCard) {
          const playerName = draggedCard.dataset.playerName;
          const parentContainer = draggedCard.parentElement;
          const newOrder = Array.from(parentContainer.querySelectorAll(".character-card"))
            .map(card => card.dataset.charId)
            .filter(Boolean);
          saveCharacterOrder(playerName, newOrder);
          return;
        }

        if (draggedType === "player") {
          // 依據當前 DOM 順序儲存玩家名稱清單
          const cards = container.querySelectorAll(".player-card");
          const newOrder = Array.from(cards)
            .map(card => card.dataset.playerName)
            .filter(Boolean);

          savePlayerOrder(newOrder);
        }
      });

      container.dataset.dragInited = "true"; // 避免重複繫結
    }
  </script>
</head>
<body>

  <div class="header">
    <h2>🎮 每週 BOSS 攻略備忘錄</h2>
    <div class="controls" style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">

      <button class="btn" onclick="openAddPlayerModal()">+ 新增玩家</button>
      <button class="btn btn-secondary" onclick="scrollToGuests()">👤 Guest 清單</button>

      <button class="btn btn-secondary" onclick="toggleAllPlayers(false)">📂 全部展開</button>
      <button class="btn" onclick="openResetConfigModal()">🎟️ 設定重置券</button>

      </button>

  </div>

  <div id="characterList"></div>
  <div id="guestSectionContainer"></div>

  <!-- 組隊設定彈窗 (右鍵點擊觸發) -->
  <div id="partyModal" class="modal" onclick="handleOverlayClick(event, closePartyModal)">
    <div class="modal-content">
      <h3 id="partyModalTitle">編輯隊伍成員</h3>
      <p style="font-size: 12px; color: #64748b;" id="partyModalSubtitle"></p>
      <div id="partySelectList" class="party-select-list"></div>
      <div style="display:flex; justify-content:space-between; margin-top:16px;">

  <!-- 重置券設定彈窗 -->

    <div class="modal-content">
      <h3>設定角色的重置券 BOSS</h3>
      <div id="modalBody"></div>
      <br>
      <button class="btn" onclick="closeResetConfigModal()">關閉</button>
    </div>
  </div>

  <!-- 新增角色彈窗 -->
  <div id="addCharacterModal" class="modal" onclick="handleOverlayClick(event, closeAddCharacterModal)">
    <div class="modal-content" style="max-width: 480px; text-align: left;">
      <h3 style="margin-top: 0; margin-bottom: 12px;">➕ 新增角色</h3>
      
      <div style="margin-bottom: 12px;">
        <label style="display: block; font-weight: bold; margin-bottom: 4px; font-size: 14px;">選擇玩家：</label>
        <select id="newCharPlayerSelect" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 14px;"></select>
      </div>

      <div style="margin-bottom: 12px;">
        <label style="display: block; font-weight: bold; margin-bottom: 4px; font-size: 14px;">角色名稱：</label>

      </div>

      <div style="margin-bottom: 16px;">
        <label style="display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px;">選擇要挑戰的 BOSS <span id="newCharBossCount" style="font-weight: normal; font-size: 13px; color: #64748b;">(已選 0 / 12)</span>：</label>
        <div id="newCharBossList" style="max-height: 180px; overflow-y: auto; border: 1px solid #e2e8f0; padding: 10px; border-radius: 6px; background: #f8fafc; display: flex; flex-direction: column; gap: 6px;"></div>

  <!-- 編輯角色 BOSS 彈窗 -->
  <div id="editCharBossesModal" class="modal" onclick="handleOverlayClick(event, closeEditCharBossesModal)">
    <div class="modal-content" style="max-width: 440px; text-align: left;">
      <h3 id="editCharTitle" style="margin-top: 0; margin-bottom: 12px;">✏️ 編輯角色的 BOSS 清單</h3>
      
      <div style="margin-bottom: 16px;">
        <label style="display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px;">選擇要挑戰的 BOSS <span id="editCharBossCount" style="font-weight: normal; font-size: 13px; color: #64748b;">(已選 0 / 12)</span>：</label>
        <div id="editCharBossList" style="max-height: 220px; overflow-y: auto; border: 1px solid #e2e8f0; padding: 10px; border-radius: 6px; background: #f8fafc; display: flex; flex-direction: column; gap: 6px;"></div>

      <div style="display: flex; justify-content: flex-end; gap: 8px;">

  <!-- 新增玩家 Modal -->

        <input type="text" id="newPlayerName" placeholder="例如：巴塔" style="width: 100%; padding: 8px; box-sizing: border-box; border-radius: 6px;">
      </div>
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="closeAddPlayerModal()">取消</button>
        <button class="btn" onclick="submitAddPlayer()">確認新增</button>
      </div>
    </div>
  </div>

  <!-- 編輯角色名稱 Modal -->
  <div id="renameCharModal" class="modal" onclick="handleOverlayClick(event, closeRenameCharModal)">
    <div class="modal-content" style="max-width: 360px; text-align: left;">
      <h3 style="margin-top: 0; margin-bottom: 16px;">🖊️ 修改角色名稱</h3>
      <div style="margin-bottom: 16px;">
        <label style="display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px;">新角色名稱：</label>
        <input type="text" id="renameCharInput"
               style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 14px; box-sizing: border-box; background: var(--input-bg); color: var(--text-main);"
               onkeypress="if(event.key==='Enter') submitRenameChar()" />
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 8px;">
        <button class="btn btn-secondary" onclick="closeRenameCharModal()">取消</button>
        <button class="btn" onclick="submitRenameChar()">儲存名稱</button>
      </div>
    </div>
  </div>

</body>
</html>
